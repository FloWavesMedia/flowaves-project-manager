<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloWaves Media - Project Manager</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #f8f7f5;
            color: #1a1a1a;
        }

        input, select, textarea, button {
            font-family: inherit;
            font-size: inherit;
        }

        input[type="text"], input[type="date"], input[type="password"], select, textarea {
            padding: 9px 12px;
            border: 0.5px solid #d1d0cc;
            border-radius: 8px;
            background: white;
            color: #1a1a1a;
            transition: all 0.2s;
        }

        input[type="text"]:hover, input[type="date"]:hover, select:hover, textarea:hover {
            border-color: #b4b2a9;
        }

        input[type="text"]:focus, input[type="date"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #185fa5;
            box-shadow: 0 0 0 2px rgba(24, 95, 165, 0.1);
        }

        button {
            padding: 9px 12px;
            border: 0.5px solid #d1d0cc;
            border-radius: 8px;
            background: transparent;
            color: #1a1a1a;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 14px;
        }

        button:hover {
            background: #eae8e0;
            border-color: #b4b2a9;
        }

        button:active {
            transform: scale(0.98);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 500;
            margin: 0;
        }

        .header p {
            font-size: 13px;
            color: #888780;
            margin: 4px 0 0 0;
        }

        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .login-screen h1 {
            font-size: 32px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .login-screen p {
            font-size: 15px;
            color: #888780;
            margin-bottom: 32px;
        }

        .users-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 400px;
        }

        .user-button {
            padding: 16px !important;
            background: white !important;
            border: 0.5px solid #d1d0cc !important;
            border-radius: 12px !important;
            cursor: pointer !important;
            font-size: 14px !important;
            font-weight: 500 !important;
            color: #1a1a1a !important;
            transition: all 0.2s !important;
        }

        .user-button:hover {
            background: #eae8e0 !important;
            border-color: #b4b2a9 !important;
        }

        .new-project-form {
            background: white;
            border: 0.5px solid #d1d0cc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .new-project-form h3 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .form-group {
            display: grid;
            gap: 12px;
            margin-bottom: 16px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group label {
            font-size: 12px;
            color: #888780;
            display: block;
            margin-bottom: 4px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 0.5px solid #d1d0cc;
        }

        .tab-button {
            padding: 12px 16px !important;
            background: transparent !important;
            border: none !important;
            border-bottom: 2px solid transparent !important;
            cursor: pointer !important;
            font-size: 14px !important;
            font-weight: 500 !important;
            color: #1a1a1a !important;
            transition: all 0.2s !important;
            border-radius: 0 !important;
        }

        .tab-button.active {
            border-bottom-color: #185fa5 !important;
            color: #185fa5 !important;
        }

        .kanban-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .kanban-column {
            background: #eae8e0;
            border-radius: 8px;
            padding: 16px;
            min-height: 400px;
        }

        .kanban-column h3 {
            font-size: 14px;
            font-weight: 500;
            margin: 0 0 16px 0;
        }

        .project-card {
            background: white;
            border: 0.5px solid #d1d0cc;
            border-radius: 8px;
            padding: 12px;
            cursor: grab;
            transition: all 0.2s;
            margin-bottom: 10px;
            user-select: none;
        }

        .project-card:hover {
            border-color: #b4b2a9;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .project-card.selected {
            border: 2px solid #185fa5;
        }

        .project-card h4 {
            font-size: 13px;
            font-weight: 500;
            margin: 0 0 4px 0;
        }

        .project-card p {
            font-size: 11px;
            color: #888780;
            margin: 0 0 6px 0;
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .project-details {
            background: #eae8e0;
            border-radius: 12px;
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .project-details h2 {
            font-size: 18px;
            font-weight: 500;
            margin: 0 0 4px 0;
        }

        .project-details > p {
            font-size: 13px;
            color: #888780;
            margin: 0 0 24px 0;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .details-field {
            background: white;
            padding: 12px;
            border-radius: 8px;
        }

        .details-field label {
            font-size: 11px;
            color: #888780;
            display: block;
            margin-bottom: 4px;
        }

        .badge {
            font-size: 11px;
            font-weight: 500;
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
        }

        .notifications {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }

        .notification {
            background: #185fa5;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .main-content {
            display: grid;
            gap: 24px;
        }

        .main-content.with-details {
            grid-template-columns: 1fr 400px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-buttons button {
            flex: 1;
        }

        .comments-section {
            border-top: 0.5px solid #d1d0cc;
            padding-top: 16px;
            margin-top: 16px;
        }

        .comments-section h4 {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .comment-input {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .comment-input input {
            flex: 1;
        }

        .comment {
            background: #eae8e0;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .comment p {
            margin: 0 0 4px 0;
        }

        .comment .author {
            font-weight: 500;
            color: #1a1a1a;
        }

        .comment .text {
            color: #888780;
        }

        .comment .time {
            font-size: 11px;
            color: #b4b2a9;
        }

        .checklist {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .checklist label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: pointer;
        }

        .checklist input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .close-button {
            padding: 6px 12px !important;
            font-size: 13px !important;
        }

        .primary-button {
            background: #185fa5 !important;
            color: white !important;
            border: none !important;
        }

        .primary-button:hover {
            background: #0c447c !important;
        }

        .filter-bar {
            margin-bottom: 16px;
        }

        .filter-bar select {
            font-size: 13px;
        }

        .empty-state {
            text-align: center;
            color: #888780;
            padding: 32px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const FloWavesProjectManager = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [showNewProject, setShowNewProject] = useState(false);
            const [notifications, setNotifications] = useState([]);
            const [draggedProject, setDraggedProject] = useState(null);
            const [selectedProject, setSelectedProject] = useState(null);
            const [activeTab, setActiveTab] = useState('kanban');
            const [newComment, setNewComment] = useState('');
            const [filterPriority, setFilterPriority] = useState('all');

            const users = [
                { id: 1, name: 'Você (Admin)', initials: 'AD' },
                { id: 2, name: 'Editor 1', initials: 'E1' },
                { id: 3, name: 'Editor 2', initials: 'E2' },
                { id: 4, name: 'Freelancer', initials: 'FR' }
            ];

            const statuses = ['parado', 'em-edição', 'atrasado', 'finalizado', 'alteração'];
            const priorities = ['baixa', 'média', 'alta', 'crítica'];

            useEffect(() => {
                const saved = localStorage.getItem('flowaves-projects');
                if (saved) setProjects(JSON.parse(saved));
                const user = localStorage.getItem('flowaves-user');
                if (user) setCurrentUser(JSON.parse(user));
            }, []);

            useEffect(() => {
                localStorage.setItem('flowaves-projects', JSON.stringify(projects));
            }, [projects]);

            const handleLogin = (userId) => {
                const user = users.find(u => u.id === userId);
                setCurrentUser(user);
                localStorage.setItem('flowaves-user', JSON.stringify(user));
            };

            const handleLogout = () => {
                setCurrentUser(null);
                localStorage.removeItem('flowaves-user');
            };

            const handleNewProject = (formData) => {
                const newProj = {
                    id: Date.now(),
                    ...formData,
                    status: 'parado',
                    createdAt: new Date().toISOString(),
                    comments: [],
                    checklist: []
                };
                setProjects([...projects, newProj]);
                setShowNewProject(false);
                addNotification(`Projeto "${formData.name}" criado com sucesso`);
            };

            const updateProjectStatus = (projectId, newStatus) => {
                setProjects(projects.map(p =>
                    p.id === projectId ? { ...p, status: newStatus, updatedAt: new Date().toISOString() } : p
                ));
                const proj = projects.find(p => p.id === projectId);
                addNotification(`Projeto "${proj.name}" movido para ${newStatus}`);
            };

            const updateProject = (projectId, updates) => {
                setProjects(projects.map(p =>
                    p.id === projectId ? { ...p, ...updates, updatedAt: new Date().toISOString() } : p
                ));
            };

            const addComment = (projectId, text) => {
                if (!text.trim()) return;
                const comment = {
                    id: Date.now(),
                    author: currentUser.name,
                    text,
                    timestamp: new Date().toISOString()
                };
                setProjects(projects.map(p =>
                    p.id === projectId ? { ...p, comments: [...(p.comments || []), comment] } : p
                ));
                setNewComment('');
                addNotification(`Comentário adicionado`);
            };

            const addNotification = (message) => {
                const id = Date.now();
                setNotifications(prev => [...prev, { id, message }]);
                setTimeout(() => {
                    setNotifications(prev => prev.filter(n => n.id !== id));
                }, 3000);
            };

            const formatDate = (date) => {
                return new Date(date).toLocaleDateString('pt-BR');
            };

            const getPriorityColor = (priority) => {
                const colors = {
                    'baixa': '#0F6E56',
                    'média': '#BA7517',
                    'alta': '#E24B4A',
                    'crítica': '#501313'
                };
                return colors[priority] || '#888780';
            };

            const getStatusColor = (status) => {
                const colors = {
                    'parado': '#5F5E5A',
                    'em-edição': '#185FA5',
                    'atrasado': '#A32D2D',
                    'finalizado': '#3B6D11',
                    'alteração': '#854F0B'
                };
                return colors[status] || '#888780';
            };

            if (!currentUser) {
                return (
                    <div className="login-screen">
                        <h1>🎬 FloWaves Media</h1>
                        <p>Project Manager - Selecione seu usuário</p>
                        <div className="users-grid">
                            {users.map(user => (
                                <button
                                    key={user.id}
                                    onClick={() => handleLogin(user.id)}
                                    className="user-button"
                                >
                                    {user.name}
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            const userProjects = projects.filter(p => p.assignedTo === currentUser.id);
            const filtered = filterPriority === 'all' 
                ? userProjects 
                : userProjects.filter(p => p.priority === filterPriority);

            const NewProjectForm = () => {
                const [form, setForm] = useState({
                    name: '',
                    client: '',
                    type: 'vídeo',
                    priority: 'média',
                    startDate: '',
                    dueDate: ''
                });

                const handleSubmit = () => {
                    if (!form.name || !form.dueDate) {
                        alert('Preenchimento obrigatório: Nome e Data de Entrega');
                        return;
                    }
                    handleNewProject({ ...form, assignedTo: currentUser.id });
                };

                return (
                    <div className="new-project-form">
                        <h3>Novo Projeto</h3>
                        
                        <div className="form-group">
                            <label>Nome do Projeto</label>
                            <input 
                                type="text" 
                                value={form.name} 
                                onChange={(e) => setForm({...form, name: e.target.value})} 
                                placeholder="Ex: Vídeo corporativo ABC"
                            />
                        </div>
                        
                        <div className="form-row">
                            <div>
                                <label>Cliente</label>
                                <input type="text" value={form.client} onChange={(e) => setForm({...form, client: e.target.value})} placeholder="Ex: ABC Ltda" />
                            </div>
                            <div>
                                <label>Tipo</label>
                                <select value={form.type} onChange={(e) => setForm({...form, type: e.target.value})}>
                                    <option>vídeo</option>
                                    <option>foto</option>
                                    <option>híbrido</option>
                                </select>
                            </div>
                        </div>

                        <div className="form-row">
                            <div>
                                <label>Prioridade</label>
                                <select value={form.priority} onChange={(e) => setForm({...form, priority: e.target.value})}>
                                    {priorities.map(p => <option key={p} value={p}>{p}</option>)}
                                </select>
                            </div>
                            <div>
                                <label>Data de Entrega</label>
                                <input type="date" value={form.dueDate} onChange={(e) => setForm({...form, dueDate: e.target.value})} />
                            </div>
                        </div>

                        <div>
                            <label>Data de Início (opcional)</label>
                            <input type="date" value={form.startDate} onChange={(e) => setForm({...form, startDate: e.target.value})} />
                        </div>

                        <div className="action-buttons" style={{marginTop: '16px'}}>
                            <button onClick={handleSubmit} className="primary-button">Criar Projeto</button>
                            <button onClick={() => setShowNewProject(false)}>Cancelar</button>
                        </div>
                    </div>
                );
            };

            const ProjectCard = ({ project }) => {
                const daysUntil = Math.ceil((new Date(project.dueDate) - new Date()) / (1000 * 60 * 60 * 24));
                const isOverdue = daysUntil < 0 && project.status !== 'finalizado';
                
                return (
                    <div
                        onClick={() => setSelectedProject(project.id)}
                        className={`project-card ${selectedProject === project.id ? 'selected' : ''}`}
                    >
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '8px'}}>
                            <div style={{flex: 1}}>
                                <h4>{project.name}</h4>
                                <p>{project.client}</p>
                            </div>
                            <div style={{display: 'flex', gap: '8px'}}>
                                <span className="badge" style={{background: `${getPriorityColor(project.priority)}20`, color: getPriorityColor(project.priority)}}>
                                    {project.priority}
                                </span>
                                <span className="badge" style={{background: `${getStatusColor(project.status)}20`, color: getStatusColor(project.status)}}>
                                    {project.status}
                                </span>
                            </div>
                        </div>
                        <p style={{fontSize: '12px', color: '#888780', marginBottom: '8px'}}>
                            Entrega: {formatDate(project.dueDate)}
                            {isOverdue && <span style={{color: '#A32D2D', fontWeight: '500'}}> ({daysUntil} dias</span>}
                            {!isOverdue && daysUntil >= 0 && <span style={{color: '#3B6D11'}}> ({daysUntil} dias)</span>}
                        </p>
                        {project.notes && <p style={{fontSize: '13px', color: '#888780', margin: '8px 0 0 0', borderTop: '0.5px solid #d1d0cc', paddingTop: '8px'}}>{project.notes}</p>}
                    </div>
                );
            };

            const KanbanColumn = ({ status }) => {
                const projectsInStatus = filtered.filter(p => p.status === status);
                return (
                    <div className="kanban-column">
                        <h3>{status} ({projectsInStatus.length})</h3>
                        <div>
                            {projectsInStatus.map(proj => (
                                <div
                                    key={proj.id}
                                    onClick={() => setSelectedProject(proj.id)}
                                    draggable
                                    onDragStart={() => setDraggedProject(proj)}
                                    onDragOver={(e) => e.preventDefault()}
                                    onDrop={() => {
                                        if (draggedProject) {
                                            updateProjectStatus(draggedProject.id, status);
                                            setDraggedProject(null);
                                        }
                                    }}
                                    style={{
                                        opacity: draggedProject?.id === proj.id ? 0.5 : 1
                                    }}
                                    className={`project-card ${selectedProject === proj.id ? 'selected' : ''}`}
                                >
                                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '6px'}}>
                                        <h4 style={{margin: 0, flex: 1}}>{proj.name}</h4>
                                        <span className="badge" style={{background: `${getPriorityColor(proj.priority)}20`, color: getPriorityColor(proj.priority), whiteSpace: 'nowrap'}}>
                                            {proj.priority}
                                        </span>
                                    </div>
                                    <p>{proj.client}</p>
                                    <div style={{fontSize: '10px', color: '#888780'}}>
                                        Entrega: {formatDate(proj.dueDate)}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const ProjectDetails = ({ project }) => {
                if (!project) return null;

                return (
                    <div className="project-details">
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '24px'}}>
                            <div style={{flex: 1}}>
                                <h2>{project.name}</h2>
                                <p>{project.client}</p>
                            </div>
                            <button onClick={() => setSelectedProject(null)} className="close-button">Fechar</button>
                        </div>

                        <div className="details-grid">
                            <div className="details-field">
                                <label>Status</label>
                                <select value={project.status} onChange={(e) => updateProjectStatus(project.id, e.target.value)} style={{width: '100%', marginTop: '4px'}}>
                                    {statuses.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                            </div>
                            <div className="details-field">
                                <label>Prioridade</label>
                                <select value={project.priority} onChange={(e) => updateProject(project.id, {priority: e.target.value})} style={{width: '100%', marginTop: '4px'}}>
                                    {priorities.map(p => <option key={p} value={p}>{p}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="details-field" style={{marginBottom: '24px'}}>
                            <label>Observações</label>
                            <textarea
                                value={project.notes || ''}
                                onChange={(e) => updateProject(project.id, {notes: e.target.value})}
                                placeholder="Notas internas, instruções especiais..."
                                style={{width: '100%', minHeight: '80px', marginTop: '4px'}}
                            />
                        </div>

                        <div className="details-field" style={{marginBottom: '24px'}}>
                            <label>Checklist de Entrega</label>
                            <div className="checklist" style={{marginTop: '8px'}}>
                                {project.checklist && project.checklist.map(item => (
                                    <label key={item.id}>
                                        <input
                                            type="checkbox"
                                            checked={item.done}
                                            onChange={() => {
                                                const updated = project.checklist.map(i => i.id === item.id ? {...i, done: !i.done} : i);
                                                updateProject(project.id, {checklist: updated});
                                            }}
                                        />
                                        <span style={{textDecoration: item.done ? 'line-through' : 'none', color: item.done ? '#888780' : '#1a1a1a'}}>
                                            {item.text}
                                        </span>
                                    </label>
                                ))}
                            </div>
                            <div style={{display: 'flex', gap: '8px', marginTop: '12px'}}>
                                <input type="text" placeholder="Novo item..." id="checklistInput" style={{flex: 1}} />
                                <button onClick={() => {
                                    const input = document.getElementById('checklistInput');
                                    if (input.value) {
                                        updateProject(project.id, {checklist: [...(project.checklist || []), {id: Date.now(), text: input.value, done: false}]});
                                        input.value = '';
                                    }
                                }}>Adicionar</button>
                            </div>
                        </div>

                        <div className="comments-section">
                            <h4>Comentários</h4>
                            <div className="comment-input">
                                <input
                                    type="text"
                                    value={newComment}
                                    onChange={(e) => setNewComment(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && addComment(project.id, newComment)}
                                    placeholder="Adicionar comentário..."
                                />
                                <button onClick={() => addComment(project.id, newComment)}>Enviar</button>
                            </div>
                            <div style={{maxHeight: '200px', overflowY: 'auto'}}>
                                {project.comments && project.comments.map(comment => (
                                    <div key={comment.id} className="comment">
                                        <p><span className="author">{comment.author}</span></p>
                                        <p className="text">{comment.text}</p>
                                        <p className="time">{formatDate(comment.timestamp)}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="container">
                    <div className="header">
                        <div>
                            <h1>🎬 FloWaves Media</h1>
                            <p>Bem-vindo, {currentUser.name}</p>
                        </div>
                        <button onClick={handleLogout}>Sair</button>
                    </div>

                    <div className="notifications">
                        {notifications.map(notif => (
                            <div key={notif.id} className="notification">
                                {notif.message}
                            </div>
                        ))}
                    </div>

                    {showNewProject && <NewProjectForm />}
                    {!showNewProject && (
                        <button
                            onClick={() => setShowNewProject(true)}
                            className="primary-button"
                            style={{marginBottom: '24px', width: '100%', padding: '12px'}}
                        >
                            + Novo Projeto
                        </button>
                    )}

                    <div className="tabs">
                        <button
                            onClick={() => setActiveTab('kanban')}
                            className={`tab-button ${activeTab === 'kanban' ? 'active' : ''}`}
                        >
                            Vista Kanban
                        </button>
                        <button
                            onClick={() => setActiveTab('lista')}
                            className={`tab-button ${activeTab === 'lista' ? 'active' : ''}`}
                        >
                            Lista
                        </button>
                    </div>

                    <div className={`main-content ${selectedProject ? 'with-details' : ''}`}>
                        <div>
                            {activeTab === 'kanban' && (
                                <>
                                    <div className="filter-bar">
                                        <select value={filterPriority} onChange={(e) => setFilterPriority(e.target.value)}>
                                            <option value="all">Todas as prioridades</option>
                                            {priorities.map(p => <option key={p} value={p}>{p}</option>)}
                                        </select>
                                    </div>
                                    <div className="kanban-container">
                                        {statuses.map(status => (
                                            <KanbanColumn key={status} status={status} />
                                        ))}
                                    </div>
                                </>
                            )}

                            {activeTab === 'lista' && (
                                <>
                                    <div className="filter-bar">
                                        <select value={filterPriority} onChange={(e) => setFilterPriority(e.target.value)}>
                                            <option value="all">Todas as prioridades</option>
                                            {priorities.map(p => <option key={p} value={p}>{p}</option>)}
                                        </select>
                                    </div>
                                    <div className="project-list">
                                        {filtered.length === 0 ? (
                                            <div className="empty-state">Nenhum projeto atribuído a você</div>
                                        ) : (
                                            filtered.map(proj => <ProjectCard key={proj.id} project={proj} />)
                                        )}
                                    </div>
                                </>
                            )}
                        </div>

                        {selectedProject && (
                            <ProjectDetails project={projects.find(p => p.id === selectedProject)} />
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<FloWavesProjectManager />);
    </script>
</body>
</html>
